/* ═══ URL STATE SHARING ═══ */
function encodeState(drivers, g, kpis, removedKpis, displayOrder) {
  const state = { d: drivers, g, k: kpis, r: removedKpis, o: displayOrder };
  const json = JSON.stringify(state);
  try {
    // LZ-string compress then encode for URL safety (60-70% smaller than plain base64)
    return LZString.compressToEncodedURIComponent(json);
  } catch(e) {
    // Fallback to plain base64 if LZ-string unavailable
    try { return btoa(unescape(encodeURIComponent(json))); } catch(e2) { return null; }
  }
}
function decodeState(encoded) {
  try {
    // Try LZ-string first
    const json = LZString.decompressFromEncodedURIComponent(encoded);
    if (json) return JSON.parse(json);
  } catch(e) {}
  try {
    // Fallback: try legacy plain base64 (handles old shared URLs)
    const json = decodeURIComponent(escape(atob(encoded)));
    return JSON.parse(json);
  } catch(e) { return null; }
}
function getURLConfig() {
  const params = new URLSearchParams(window.location.search);
  const cfg = params.get("config");
  if (!cfg) return null;
  return decodeState(cfg);
}
function generateShareURL(drivers, g, kpis, removedKpis, displayOrder) {
  const encoded = encodeState(drivers, g, kpis, removedKpis, displayOrder);
  if (!encoded) return null;
  const base = window.location.origin + window.location.pathname;
  return base + "?config=" + encoded;
}
function getCategoryFromLibrary(id) {
  const cat = DRIVER_LIBRARY.find(c => c.items.some(it => it.id === id));
  return cat ? cat.cat : "Productivity Gains";
}
function buildDisplayOrderFromDrivers(drivers) {
  if (!drivers.length) return [];
  const catOrder = DRIVER_LIBRARY.map(c => c.cat);
  const getCat = (d) => d.category || getCategoryFromLibrary(d.id);
  const out = [];
  catOrder.forEach(cat => {
    const inCat = drivers.filter(d => getCat(d) === cat);
    if (inCat.length) {
      out.push({ type: "section", category: cat });
      inCat.forEach(d => out.push({ type: "driver", id: d.id }));
    }
  });
  return out;
}
function insertDriversIntoDisplayOrder(displayOrder, newDrivers) {
  let order = [...displayOrder];
  const getCat = (d) => d.category || getCategoryFromLibrary(d.id);
  newDrivers.forEach(nd => {
    const cat = getCat(nd);
    let sectionIdx = order.findIndex(x => x.type === "section" && x.category === cat);
    if (sectionIdx === -1) {
      order.push({ type: "section", category: cat });
      order.push({ type: "driver", id: nd.id });
      return;
    }
    let insertIdx = sectionIdx + 1;
    while (insertIdx < order.length && order[insertIdx].type === "driver") insertIdx++;
    order.splice(insertIdx, 0, { type: "driver", id: nd.id });
  });
  return order;
}
function getSectionBeforeDriver(order, driverId) {
  const idx = order.findIndex(x => x.type === "driver" && x.id === driverId);
  if (idx <= 0) return null;
  for (let i = idx - 1; i >= 0; i--) if (order[i].type === "section") return order[i].category;
  return null;
}
function getSectionBlockEnd(order, sectionIdx) {
  let i = sectionIdx + 1;
  while (i < order.length && order[i].type === "driver") i++;
  return i - 1;
}
function getPrevSectionIndex(order, sectionIdx) {
  for (let i = sectionIdx - 1; i >= 0; i--) if (order[i].type === "section") return i;
  return -1;
}
function getNextSectionIndex(order, sectionIdx) {
  for (let i = sectionIdx + 1; i < order.length; i++) if (order[i].type === "section") return i;
  return order.length;
}
function moveSectionBlockUp(order, sectionIdx) {
  const endIdx = getSectionBlockEnd(order, sectionIdx);
  const prevSectionIdx = getPrevSectionIndex(order, sectionIdx);
  if (prevSectionIdx === -1) return order;
  const block = order.slice(sectionIdx, endIdx + 1);
  const before = order.slice(0, prevSectionIdx);
  const between = order.slice(prevSectionIdx, sectionIdx);
  const after = order.slice(endIdx + 1);
  return [...before, ...block, ...between, ...after];
}
function moveSectionBlockDown(order, sectionIdx) {
  const endIdx = getSectionBlockEnd(order, sectionIdx);
  const nextSectionIdx = getNextSectionIndex(order, sectionIdx);
  if (nextSectionIdx >= order.length) return order;
  const nextEndIdx = getSectionBlockEnd(order, nextSectionIdx);
  const block = order.slice(sectionIdx, nextSectionIdx);
  const nextBlock = order.slice(nextSectionIdx, nextEndIdx + 1);
  const before = order.slice(0, sectionIdx);
  const after = order.slice(nextEndIdx + 1);
  return [...before, ...nextBlock, ...block, ...after];
}

const fmtK = (n) => { const a=Math.abs(n);if(a>=1e6)return`${_cur}${(n/1e6).toFixed(1)}M`;if(a>=100000)return`${_cur}${(n/1e3).toFixed(0)}K`;if(a>=1e3)return`${_cur}${(n/1e3).toFixed(1)}K`;return`${_cur}${Math.round(n)}`; };
const pct = (n) => `${(n*100).toFixed(1)}%`;

function calcDriver(d, af, year) {
  if (!d.enabled) return 0; const i=d.inputs;
  const hr=(i.fteCost!=null?i.fteCost:100000)/2080;
  switch (d.type) {
    case "time": return i.people*i.hoursPerCycle*i.cyclesPerYear*hr*i.reduction*af;
    case "incident": return i.people*i.hoursPerIncident*i.incidentsPerYear*hr*i.recapture*af;
    case "risk": return (i.costPerIncident*i.probCurrent)-(i.costPerIncident*i.probWrike);
    case "revenue": return i.annualValue*i.improvement*af;
    case "project_delay": return i.projectsPerYear*i.delayRate*i.avgDelayDays*i.dailyCostOfDelay*i.reductionRate*af;
    case "customer_churn": return (i.churnImpact||0)*(i.currentCustomers||0)*(i.avgRevenuePerCustomer||0)*af;
    case "profit_margin": return (i.profitMarginImpact||0)*(i.annualRevenue||0)*af;
    case "revenue_pct": return (i.revenueImpact||0)*(i.annualRevenue||0)*af;
    case "deprecate_software": return year!=null?(i["year"+year+"Cost"]||0):0;
    default: return 0;
  }
}
function calcDriverHours(d, af) {
  if (!d.enabled) return 0; const i=d.inputs;
  switch (d.type) {
    case "time": return i.people*i.hoursPerCycle*i.cyclesPerYear*i.reduction*af;
    case "incident": return i.people*i.hoursPerIncident*i.incidentsPerYear*i.recapture*af;
    default: return 0;
  }
}
const fmtHrs = (n) => { const r=Math.round(n); if(r>=1000) return `${(r/1000).toFixed(1)}K hrs`; return `${r.toLocaleString()} hrs`; };

  sc(ws2,r,0,"Cumulative ROI",S.bold);sc(ws2,r,1,model.roi,{font:{bold:true,sz:10,color:{rgb:"0369A1"},name:"Arial"},numFmt:"0.0%",alignment:{horizontal:"right"}});r++;

  /* Header */

  sc(ws4,r,0,"Value Driver",chL);

  sc(ws4,r,2,"Hrs / Unit",ch);

  sc(ws4,r,4,"Reduction %",ch);
  sc(ws4,r,5,"Baseline Hrs/Yr (Today)",chHrs);
  sc(ws4,r,6,"Goal Hrs/Yr (with Wrike)",chHrs);

  sc(ws4,r,8,"Annual $ Value",ch$);
  r++;

  /* Row styles */
  const cellN={font:{sz:10,name:"Arial"},numFmt:"#,##0",alignment:{horizontal:"right"}};

      sf(ws4,r,7,"=F"+rowRef+"-G"+rowRef,cellHrsSaved);

    } else if(d.type==="risk"){

    } else if(d.type==="project_delay"){

      /* Col G: Goal delayed project-days = Baseline * (1 - Reduction) */
      sf(ws4,r,6,"=F"+rowRef+"*(1-E"+rowRef+")",cellHrsGoal);
      /* Col H: Project-days saved = Baseline - Goal */
      sf(ws4,r,7,"=F"+rowRef+"-G"+rowRef,cellHrsSaved);
      /* Col I: Annual $ Value = days saved * daily cost */
      sf(ws4,r,8,"=H"+rowRef+"*"+aRef["d"+di+"_dailyCostOfDelay"],cell$);
      baseHrsRows.push(rowRef);goalHrsRows.push(rowRef);savedHrsRows.push(rowRef);dollarRows.push(rowRef);
    } else if(d.type==="customer_churn"){
      sf(ws4,r,1,"="+aRef["d"+di+"_currentCustomers"],cellN);

      sf(ws4,r,3,"="+aRef["d"+di+"_churnImpact"],cellP);

      sf(ws4,r,8,"="+aRef["d"+di+"_churnImpact"]+"*"+aRef["d"+di+"_currentCustomers"]+"*"+aRef["d"+di+"_avgRevenuePerCustomer"],cell$);

    } else if(d.type==="profit_margin"){

      sc(ws4,r,3,"—",cellNA);sc(ws4,r,4,"—",cellNA);sc(ws4,r,5,"—",cellNA);sc(ws4,r,6,"—",cellNA);sc(ws4,r,7,"—",cellNA);
      sf(ws4,r,8,"="+aRef["d"+di+"_profitMarginImpact"]+"*"+aRef["d"+di+"_annualRevenue"],cell$);
      dollarRows.push(rowRef);
    } else if(d.type==="revenue_pct"){

      sf(ws4,r,2,"="+aRef["d"+di+"_revenueImpact"],cellP);
      sc(ws4,r,3,"—",cellNA);sc(ws4,r,4,"—",cellNA);sc(ws4,r,5,"—",cellNA);sc(ws4,r,6,"—",cellNA);sc(ws4,r,7,"—",cellNA);
      sf(ws4,r,8,"="+aRef["d"+di+"_revenueImpact"]+"*"+aRef["d"+di+"_annualRevenue"],cell$);
      dollarRows.push(rowRef);
    } else if(d.type==="deprecate_software"){
      sf(ws4,r,1,"="+aRef["d"+di+"_year1Cost"],cell$);sf(ws4,r,2,"="+aRef["d"+di+"_year2Cost"],cell$);sf(ws4,r,3,"="+aRef["d"+di+"_year3Cost"],cell$);sf(ws4,r,4,"="+aRef["d"+di+"_year4Cost"],cell$);sf(ws4,r,5,"="+aRef["d"+di+"_year5Cost"],cell$);
      sc(ws4,r,6,"—",cellNA);sc(ws4,r,7,"—",cellNA);
      sf(ws4,r,8,"="+aRef["d"+di+"_year1Cost"]+"+"+aRef["d"+di+"_year2Cost"]+"+"+aRef["d"+di+"_year3Cost"]+"+"+aRef["d"+di+"_year4Cost"]+"+"+aRef["d"+di+"_year5Cost"],cell$);
      dollarRows.push(rowRef);

    r++;
  });

  /* Totals row */
  r++;
  const totStyle={font:{bold:true,sz:10,color:{rgb:"FFFFFF"},name:"Arial"},fill:{fgColor:{rgb:"1E3A5F"}},numFmt:"#,##0",alignment:{horizontal:"right"}};
  const totHrsStyle={font:{bold:true,sz:10,color:{rgb:"FFFFFF"},name:"Arial"},fill:{fgColor:{rgb:"4C1D95"}},numFmt:"#,##0",alignment:{horizontal:"right"}};
  const tot$Style={font:{bold:true,sz:10,color:{rgb:"FFFFFF"},name:"Arial"},fill:{fgColor:{rgb:"065F46"}},numFmt:"$#,##0",alignment:{horizontal:"right"}};
  const totLblStyle={font:{bold:true,sz:10,color:{rgb:"FFFFFF"},name:"Arial"},fill:{fgColor:{rgb:"1E3A5F"}}};
  sc(ws4,r,0,"TOTALS",totLblStyle);
  sc(ws4,r,1,"",totStyle);sc(ws4,r,2,"",totStyle);sc(ws4,r,3,"",totStyle);sc(ws4,r,4,"",totStyle);
  sf(ws4,r,5,baseHrsRows.length>0?"="+baseHrsRows.map(rx=>"F"+rx).join("+"):"=0",totHrsStyle);

  sf(ws4,r,7,savedHrsRows.length>0?"="+savedHrsRows.map(rx=>"H"+rx).join("+"):"=0",totHrsStyle);
  sf(ws4,r,8,dollarRows.length>0?"="+dollarRows.map(rx=>"I"+rx).join("+"):"=0",tot$Style);

  ws4["!ref"]="A1:I"+(r+1);

/* ── Word Export ── */
async function exportWord(model, drivers, g) {
  if (typeof docx === "undefined") { alert("Word export requires browser with CDN access."); return; }

  const {
    Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
    Header, Footer, AlignmentType, HeadingLevel, BorderStyle, WidthType,
    ShadingType, VerticalAlign, PageBreak, LevelFormat, ImageRun
  } = docx;

  // ── Constants ────────────────────────────────────────────────────────────
  const el      = drivers.filter(d => d.enabled);
  const H       = g.horizon;
  const cName   = g.customerName || "[CUSTOMER NAME]";
  const useNPV  = g.discountEnabled && (g.discountRate || 0) > 0;
  const netLabel = useNPV ? "Net Present Value" : "Net Value";
  const netShort = useNPV ? "NPV" : "Net Value";

  const C = {
    green:  "00875A", greenLight: "E8F5EE", greenAccent: "00C65E",
    dark:   "0D1526", mid:        "1E3A5F", mutedDark:   "374151",
    muted:  "6B7280", border:     "D1D5DB", light:       "F3F4F6",
    white:  "FFFFFF", red:        "EF4444", redLight:    "FEF2F2",
    blue:   "3B82F6", blueLight:  "EFF6FF", yellow:      "F59E0B",
    yellowLight: "FFFBEB",
  };

  // ── Formatters ────────────────────────────────────────────────────────────
  const fmt  = n => { const a=Math.abs(Math.round(n)); return (n<0?"-$":"$")+a.toLocaleString("en-US"); };
  const fmtK = n => { const a=Math.abs(n); if(a>=1e6) return (n<0?"-":"")+"$"+(a/1e6).toFixed(1)+"M"; if(a>=1e3) return (n<0?"-":"")+"$"+(a/1e3).toFixed(0)+"K"; return (n<0?"-":"")+"$"+Math.round(a); };
  const pct  = n => (n*100).toFixed(1)+"%";
  const fmtHours = h => { if(h>=1000) return (h/1000).toFixed(1)+"K hrs"; return Math.round(h)+" hrs"; };

  // ── Helpers ────────────────────────────────────────────────────────────────
  const CONTENT_W = 9360; // US Letter 8.5" - 1.5" margins = 7" = 10080 DXA, but we use 0.75" = 9360
  const noBorder = () => ({ top:{style:BorderStyle.NONE,size:0,color:C.white}, bottom:{style:BorderStyle.NONE,size:0,color:C.white}, left:{style:BorderStyle.NONE,size:0,color:C.white}, right:{style:BorderStyle.NONE,size:0,color:C.white} });
  const thinBorder = (col=C.border) => ({ top:{style:BorderStyle.SINGLE,size:1,color:col}, bottom:{style:BorderStyle.SINGLE,size:1,color:col}, left:{style:BorderStyle.SINGLE,size:1,color:col}, right:{style:BorderStyle.SINGLE,size:1,color:col} });
  const cm = { top:80, bottom:80, left:120, right:120 };

  const run = (text, opts={}) => new TextRun({ text, font:"Arial", ...opts });
  const boldRun = (text, color=C.mutedDark, size=22) => new TextRun({ text, font:"Arial", bold:true, color, size });
  const p = (children, opts={}) => new Paragraph({ children, ...opts });
  const gap = (before=120, after=60) => new Paragraph({ children:[], spacing:{before,after} });

  const h1 = text => new Paragraph({
    heading: HeadingLevel.HEADING_1,
    children: [new TextRun({ text, font:"Arial", size:44, bold:true, color:C.dark })],
    spacing: { before:360, after:120 },
    border: { bottom:{ style:BorderStyle.SINGLE, size:8, color:C.green, space:4 } }
  });
  const h2 = text => new Paragraph({
    heading: HeadingLevel.HEADING_2,
    children: [new TextRun({ text, font:"Arial", size:28, bold:true, color:C.mid })],
    spacing: { before:240, after:100 }
  });
  const bodyP = (text, opts={}) => new Paragraph({
    children: [new TextRun({ text, font:"Arial", size:22, color:C.mutedDark })],
    spacing: { before:60, after:60 }, ...opts
  });
  const italicP = text => new Paragraph({
    children: [new TextRun({ text, font:"Arial", size:20, color:C.muted, italics:true })],
    spacing: { before:40, after:120 }
  });
  const bul = (text, boldPrefix=null) => {
    const kids = boldPrefix
      ? [new TextRun({text:boldPrefix+" ", font:"Arial", size:22, bold:true, color:C.mutedDark}),
         new TextRun({text, font:"Arial", size:22, color:C.mutedDark})]
      : [new TextRun({text, font:"Arial", size:22, color:C.mutedDark})];
    return new Paragraph({ numbering:{reference:"bullets",level:0}, children:kids, spacing:{before:40,after:40} });
  };
  const pageBreak = () => new Paragraph({ children:[new PageBreak()], spacing:{before:0,after:0} });

  // Callout box (left-border accent)
  const callout = (label, text, fill=C.blueLight, accent=C.blue) => new Table({
    width:{size:CONTENT_W,type:WidthType.DXA}, columnWidths:[CONTENT_W],
    rows:[new TableRow({children:[new TableCell({
      borders:{ top:{style:BorderStyle.NONE,size:0,color:C.white}, bottom:{style:BorderStyle.NONE,size:0,color:C.white}, left:{style:BorderStyle.THICK,size:18,color:accent}, right:{style:BorderStyle.NONE,size:0,color:C.white} },
      shading:{fill,type:ShadingType.CLEAR},
      margins:{top:120,bottom:120,left:200,right:200},
      width:{size:CONTENT_W,type:WidthType.DXA},
      children:[
        p([new TextRun({text:label,font:"Arial",size:20,bold:true,color:accent})],{spacing:{before:0,after:60}}),
        p([new TextRun({text,font:"Arial",size:21,color:C.mutedDark})],{spacing:{before:0,after:0}}),
      ]
    })]})],
  });

  // Placeholder dashed box
  const placeholder = (label, hint) => new Table({
    width:{size:CONTENT_W,type:WidthType.DXA}, columnWidths:[CONTENT_W],
    rows:[new TableRow({children:[new TableCell({
      borders:{ top:{style:BorderStyle.DASHED,size:4,color:C.border}, bottom:{style:BorderStyle.DASHED,size:4,color:C.border}, left:{style:BorderStyle.DASHED,size:4,color:C.border}, right:{style:BorderStyle.DASHED,size:4,color:C.border} },
      shading:{fill:C.light,type:ShadingType.CLEAR},
      margins:{top:100,bottom:100,left:160,right:160},
      width:{size:CONTENT_W,type:WidthType.DXA},
      children:[
        p([new TextRun({text:`[${label}]`,font:"Arial",size:21,bold:true,color:C.muted})],{spacing:{before:0,after:40}}),
        p([new TextRun({text:hint,font:"Arial",size:20,italics:true,color:C.muted})],{spacing:{before:0,after:0}}),
      ]
    })]})],
  });

  // Standard data table with dark header
  const dataTable = (headers, rows, colWidths) => {
    const hRow = new TableRow({ tableHeader:true, children: headers.map((h,i) =>
      new TableCell({ borders:thinBorder(C.green), shading:{fill:C.dark,type:ShadingType.CLEAR}, margins:cm, width:{size:colWidths[i],type:WidthType.DXA},
        children:[p([new TextRun({text:h,font:"Arial",size:21,bold:true,color:C.white})],{spacing:{before:60,after:60},alignment:i>0?AlignmentType.RIGHT:AlignmentType.LEFT})]
      })
    )});
    const dRows = rows.map((row,ri) => new TableRow({ children: row.map((cell,ci) => {
      const isTotal = typeof cell === "object" && cell.total;
      const txt = typeof cell === "object" ? cell.text : cell;
      const fill = isTotal ? C.greenLight : (ri%2===0 ? C.white : C.light);
      const textColor = isTotal ? C.green : C.mutedDark;
      return new TableCell({ borders:thinBorder(), shading:{fill,type:ShadingType.CLEAR}, margins:cm, width:{size:colWidths[ci],type:WidthType.DXA},
        children:[p([new TextRun({text:txt,font:"Arial",size:21,bold:isTotal,color:textColor})],{spacing:{before:40,after:40},alignment:ci>0?AlignmentType.RIGHT:AlignmentType.LEFT})]
      });
    })}));
    return new Table({ width:{size:CONTENT_W,type:WidthType.DXA}, columnWidths:colWidths, rows:[hRow,...dRows] });
  };

  // KPI card row table (dark background)
  const kpiRow = cards => {
    const w = Math.floor(CONTENT_W/cards.length);
    const widths = cards.map((_,i) => i<cards.length-1 ? w : CONTENT_W - w*(cards.length-1));
    return new Table({
      width:{size:CONTENT_W,type:WidthType.DXA}, columnWidths:widths,
      rows:[new TableRow({ children: cards.map((k,i) => new TableCell({
        borders:thinBorder(C.green), shading:{fill:C.dark,type:ShadingType.CLEAR},
        margins:{top:160,bottom:160,left:160,right:160}, width:{size:widths[i],type:WidthType.DXA},

  // ── Chart rendering via Canvas → PNG base64 ──────────────────────────────
  function makeCanvas(w, h) {

  // Bar chart: value by driver
  function renderDriverBarChart() {
    const leverColors = ["#00E05C","#37CEBA","#FFCF00","#A78BFA","#F97316","#14B8A6","#EC4899","#6366F1"];
    const allLevers = [
      ...el.map((d,i) => ({ name:d.name, val:model.lt[d.id]||0, color:leverColors[i%leverColors.length] })),
      ...(model.lt._fte>0 ? [{ name:"FTE Avoidance", val:model.lt._fte, color:"#10B981" }] : []),
      ...(model.lt._l4>0  ? [{ name:"Platform Consolidation", val:model.lt._l4, color:"#059669" }] : []),
    ].filter(l=>l.val>0).sort((a,b)=>b.val-a.val).slice(0,8);

    const W=900, H=420, padL=180, padR=40, padT=40, padB=60;
    const { canvas, ctx } = makeCanvas(W, H);
    ctx.fillStyle="#FFFFFF"; ctx.fillRect(0,0,W,H);

    const maxVal = Math.max(...allLevers.map(l=>l.val));
    const barH   = Math.floor((H-padT-padB)/allLevers.length*0.6);
    const gap2   = Math.floor((H-padT-padB)/allLevers.length);
    const barMaxW = W-padL-padR;

    allLevers.forEach((lev,i) => {
      const y = padT + i*gap2 + (gap2-barH)/2;
      const barW = Math.max(4, (lev.val/maxVal)*barMaxW);
      // Label
      ctx.fillStyle="#374151"; ctx.font="bold 13px Arial";
      ctx.textAlign="right"; ctx.textBaseline="middle";
      const labelText = lev.name.length>22 ? lev.name.slice(0,21)+"…" : lev.name;
      ctx.fillText(labelText, padL-8, y+barH/2);
      // Bar
      ctx.fillStyle=lev.color;
      ctx.beginPath(); ctx.roundRect(padL, y, barW, barH, 3); ctx.fill();
      // Value
      ctx.fillStyle="#374151"; ctx.font="bold 12px Arial";
      ctx.textAlign="left"; ctx.textBaseline="middle";
      ctx.fillText(fmtK(lev.val), padL+barW+6, y+barH/2);
    });

    // Title
    ctx.fillStyle="#0D1526"; ctx.font="bold 15px Arial";
    ctx.textAlign="left"; ctx.textBaseline="top";
    ctx.fillText(`${H}-Year Value by Driver`, padL, 8);

    return canvas.toDataURL("image/png").split(",")[1];
  }

  // Cumulative cash flow line chart
  function renderCashFlowChart() {
    const W=900, H=380, padL=80, padR=40, padT=50, padB=60;
    const { canvas, ctx } = makeCanvas(W, H);
    ctx.fillStyle="#FFFFFF"; ctx.fillRect(0,0,W,H);

    // Build monthly data points (12 pts per year)
    const months = H * g.horizon;
    const pts = [];
    let cumBen=0, cumCost=0;
    for(let y=0; y<g.horizon; y++) {
      const yr = model.years[y];
      const mBen  = yr.totalBenefit/12;
      const mCost = yr.totalCost/12;
      for(let m=0; m<12; m++) {
        cumBen  += mBen;
        cumCost += mCost;
        pts.push({ x:(y*12+m+1), ben:cumBen, cost:cumCost, net:cumBen-cumCost });
      }
    }
    const totalMonths = g.horizon * 12;
    const allVals = pts.flatMap(p=>[p.ben, p.cost, p.net]);
    const minV = Math.min(0, ...allVals);
    const maxV = Math.max(...allVals);
    const range = maxV - minV || 1;

    const toX = m => padL + ((m-1)/totalMonths)*(W-padL-padR);
    const toY = v => padT + (1-(v-minV)/range)*(H-padT-padB);

    // Zero line
    const zeroY = toY(0);
    ctx.strokeStyle="#E5E7EB"; ctx.lineWidth=1; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(padL,zeroY); ctx.lineTo(W-padR,zeroY); ctx.stroke();
    ctx.setLineDash([]);

    // Grid lines & x-axis labels
    ctx.fillStyle="#6B7280"; ctx.font="12px Arial"; ctx.textAlign="center";
    for(let y=1; y<=g.horizon; y++) {
      const x = toX(y*12);
      ctx.strokeStyle="#F3F4F6"; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(x,padT); ctx.lineTo(x,H-padB); ctx.stroke();
      ctx.fillText(`Year ${y}`, x, H-padB+18);
    }

    // Draw lines
    const drawLine = (key, color, dash=[]) => {
      ctx.strokeStyle=color; ctx.lineWidth=2.5; ctx.setLineDash(dash);
      ctx.beginPath();
      pts.forEach((pt,i) => { const x=toX(pt.x), y=toY(pt[key]); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
      ctx.stroke(); ctx.setLineDash([]);
    };
    drawLine("cost","#EF4444",[5,3]);
    drawLine("ben","#00875A");
    drawLine("net","#3B82F6");

    // Payback marker
    if(model.pbm && model.pbm<=totalMonths) {
      const px=toX(model.pbm);
      ctx.strokeStyle="#F59E0B"; ctx.lineWidth=2; ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(px,padT); ctx.lineTo(px,H-padB); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle="#F59E0B"; ctx.font="bold 11px Arial"; ctx.textAlign="center";
      ctx.fillText(`Payback: Mo ${model.pbm}`, px, padT-8);
    }

    // Legend
    const legend = [["Cumulative Benefit","#00875A",[]],["Cumulative Cost","#EF4444",[5,3]],["Net Value","#3B82F6",[]]];
    let lx = padL;
    legend.forEach(([label,color,dash]) => {
      ctx.strokeStyle=color; ctx.lineWidth=2.5; ctx.setLineDash(dash);
      ctx.beginPath(); ctx.moveTo(lx,H-14); ctx.lineTo(lx+22,H-14); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle="#374151"; ctx.font="12px Arial"; ctx.textAlign="left";
      ctx.fillText(label, lx+26, H-10);
      lx += label.length*7+40;
    });

    // Y-axis labels
    ctx.fillStyle="#6B7280"; ctx.font="11px Arial"; ctx.textAlign="right";
    [0,0.25,0.5,0.75,1].forEach(frac => {
      const v = minV + frac*range;
      const y = toY(v);
      ctx.fillText(fmtK(v), padL-6, y+4);
    });

    // Title
    ctx.fillStyle="#0D1526"; ctx.font="bold 15px Arial";
    ctx.textAlign="left"; ctx.textBaseline="top";
    ctx.fillText(`Cumulative Cash Flow — ${g.horizon}-Year Horizon`, padL, 8);

    return canvas.toDataURL("image/png").split(",")[1];
  }

        ["ROI","(Total Benefit − Total Cost) ÷ Total Cost, as a percentage."],
        ["Adoption Ramp","Months before full productivity benefits are assumed to accrue."],
        ["FTE Avoidance","Headcount growth absorbed by the platform rather than additional hires."],

  };

  // ── Assemble document ────────────────────────────────────────────────────
  const allChildren = [
    ...coverSection(),
    ...instructionsSection(),
    ...execSummarySection(),
    ...existingTeamSection(),
    ...currentFutureSection(),
    ...financialSection(),
    ...stratValueSection(),
    ...appendixSection(),

  const doc = new Document({
    numbering: { config:[
      { reference:"bullets", levels:[{ level:0, format:LevelFormat.BULLET, text:"•", alignment:AlignmentType.LEFT, style:{paragraph:{indent:{left:720,hanging:360}}} }] },
    ]},
    styles: {
      default: { document:{ run:{ font:"Arial", size:22 } } },
      paragraphStyles:[
        { id:"Heading1", name:"Heading 1", basedOn:"Normal", next:"Normal", quickFormat:true,

      headers:{ default: new Header({ children:[
        new Table({ width:{size:10080,type:WidthType.DXA}, columnWidths:[5040,5040], rows:[new TableRow({children:[
          new TableCell({borders:noBorder(),shading:{fill:"FFFFFF",type:ShadingType.CLEAR},margins:{top:60,bottom:60,left:0,right:0},width:{size:5040,type:WidthType.DXA},children:[p([run("wrike",{size:20,bold:true,color:"0D1526"})],{spacing:{before:0,after:0}})]}),

        ]})]})  ,
        new Paragraph({border:{bottom:{style:BorderStyle.SINGLE,size:4,color:"00875A",space:1}},children:[],spacing:{before:60,after:0}}),
      ]})},
      footers:{ default: new Footer({ children:[
        new Paragraph({border:{top:{style:BorderStyle.SINGLE,size:2,color:"D1D5DB",space:4}},children:[],spacing:{before:0,after:60}}),
        new Table({ width:{size:10080,type:WidthType.DXA}, columnWidths:[6720,3360], rows:[new TableRow({children:[
          new TableCell({borders:noBorder(),shading:{fill:"FFFFFF",type:ShadingType.CLEAR},margins:{top:40,bottom:40,left:0,right:0},width:{size:6720,type:WidthType.DXA},children:[p([run("© Wrike, Inc. | Confidential",{size:18,color:"6B7280"})],{spacing:{before:0,after:0}})]}),
          new TableCell({borders:noBorder(),shading:{fill:"FFFFFF",type:ShadingType.CLEAR},margins:{top:40,bottom:40,left:0,right:0},width:{size:3360,type:WidthType.DXA},children:[p([run("Prepared for "+cName,{size:18,color:"6B7280"})],{alignment:AlignmentType.RIGHT,spacing:{before:0,after:0}})]}),
        ]})]})

  const buffer = await Packer.toBlob(doc);
  const url = URL.createObjectURL(buffer);
  const a = document.createElement("a");
  a.href = url;
  a.download = `Wrike_Business_Case${g.customerName?"_"+g.customerName.replace(/\s+/g,"_"):""}.docx`;

}

/* ── PPTX Export ── */
function exportPPTX(model, drivers, g) {
  if (typeof PptxGenJS === "undefined") { alert("PPTX export requires browser with CDN access."); return; }

  const el = drivers.filter(d => d.enabled);
  const H = g.horizon;
  const cName = g.customerName || "[CUSTOMER NAME]";
  const fmt = (n) => { const a = Math.abs(Math.round(n)); const s = a.toLocaleString("en-US"); return (n < 0 ? "-$" : "$") + s; };
  const fmtK = (n) => { const a = Math.abs(n); if (a >= 1e6) return (n<0?"-":"")+"$"+(Math.abs(n)/1e6).toFixed(1)+"M"; if (a >= 1e3) return (n<0?"-":"")+"$"+(Math.abs(n)/1e3).toFixed(0)+"K"; return (n<0?"-":"")+"$"+Math.round(Math.abs(n)); };
  const pct = (n) => (n * 100).toFixed(1) + "%";

  // Brand colors (no # prefix — PptxGenJS requirement)
  const C = {
    bg:       "121722",  // slide background
    bgCard:   "1E2D45",  // card backgrounds
    bgDark:   "0D1526",  // deeper dark
    bgMid:    "162136",  // medium dark
    bgLight:  "2A3F5C",  // lighter card
    green:    "00E05C",  // positive accent
    teal:     "37CEBA",  // secondary accent
    yellow:   "FFCF00",  // highlight accent
    red:      "EF4444",  // cost / risk
    white:    "FFFFFF",
    muted:    "A0AEC0",
    mutedDim: "6B7A99",
    border:   "2A3F5C",
  };

  const pres = new PptxGenJS();
  pres.layout = "LAYOUT_16x9"; // 10" × 5.625"
  pres.title = `Wrike Business Case — ${cName}`;
  pres.author = "Wrike Value Model";

  // ─── Helpers ─────────────────────────────────────────────────────────────

  // Add dark slide background + subtle top accent bar + footer
  function addBase(slide, accentColor) {
    const ac = accentColor || C.green;
    slide.background = { color: C.bg };

    slide.addShape(pres.shapes.RECTANGLE, { x: 0, y: 0, w: 10, h: 0.04, fill: { color: ac }, line: { type: "none" } });
    // Footer bar
    slide.addShape(pres.shapes.RECTANGLE, { x: 0, y: 5.45, w: 10, h: 0.175, fill: { color: C.bgDark }, line: { type: "none" } });
    // Footer text
    slide.addText("© Wrike, Inc. | Confidential", { x: 0.3, y: 5.46, w: 4, h: 0.15, fontSize: 7, color: C.mutedDim, fontFace: "Arial", valign: "middle", margin: 0 });
    // Footer Wrike wordmark (right side)
    slide.addText("wrike", { x: 8.5, y: 5.46, w: 1.2, h: 0.15, fontSize: 8, bold: true, color: C.white, fontFace: "Arial", align: "right", valign: "middle", margin: 0 });
  }

  // Slide title (top-left, clean)
  function addTitle(slide, title, subtitle) {
    slide.addText(title, { x: 0.4, y: 0.14, w: 9.2, h: 0.42, fontSize: 18, bold: true, color: C.white, fontFace: "Arial", valign: "middle", margin: 0 });
    if (subtitle) {
      slide.addText(subtitle, { x: 0.4, y: 0.56, w: 9.2, h: 0.22, fontSize: 9, color: C.muted, fontFace: "Arial", valign: "middle", margin: 0 });
    }
  }

  // KPI card: dark card with label, big value, sub-label
  function addKpiCard(slide, x, y, w, h, label, value, sub, valueColor) {
    const vc = valueColor || C.green;
    slide.addShape(pres.shapes.RECTANGLE, { x, y, w, h, fill: { color: C.bgCard }, line: { color: C.border, pt: 1 } });
    slide.addText(label, { x: x + 0.12, y: y + 0.10, w: w - 0.24, h: 0.18, fontSize: 7, color: C.muted, fontFace: "Arial", bold: true, charSpacing: 1, margin: 0 });
    slide.addText(value, { x: x + 0.12, y: y + 0.28, w: w - 0.24, h: 0.38, fontSize: 20, bold: true, color: vc, fontFace: "Arial", valign: "middle", margin: 0 });
    if (sub) {
      slide.addText(sub, { x: x + 0.12, y: y + 0.66, w: w - 0.24, h: 0.16, fontSize: 7.5, color: C.mutedDim, fontFace: "Arial", margin: 0 });
    }
  }

  // Section divider label (small caps-style label)

    const col = color || C.teal;

    const npvVal = fmtK(model.npv);

/* ── UI ── */
function Tip({text,alignLeft}){const[show,setShow]=useState(false);if(!text)return null;return(
  <span style={{position:"relative",display:"inline-flex",flexShrink:0,marginLeft:alignLeft?2:5,cursor:"pointer"}} onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)} onClick={()=>setShow(!show)}>
    <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:15,height:15,borderRadius:"50%",background:"#e2e8f0",color:"#475569",fontSize:9,fontWeight:700}}>?</span>
    {show&&<div style={{position:"absolute",bottom:22,...(alignLeft?{right:0,transform:"none"}:{left:"50%",transform:"translateX(-50%)"}),width:260,maxWidth:"min(260px,calc(100vw - 40px))",background:"#1e293b",color:"#f1f5f9",padding:"10px 12px",borderRadius:8,fontSize:11,lineHeight:1.5,zIndex:9999,boxShadow:"0 8px 24px rgba(0,0,0,0.25)",fontWeight:400,pointerEvents:"none"}}>
      <div style={{position:"absolute",bottom:-5,width:10,height:10,background:"#1e293b",...(alignLeft?{right:8,transform:"rotate(45deg)"}:{left:"50%",transform:"translateX(-50%) rotate(45deg)"})}}/>{text}
    </div>}
  </span>);
}
function formatNum(n){if(n===undefined||n===null||n===""||isNaN(n))return"";return Number(n).toLocaleString("en-US",{maximumFractionDigits:20});}
function parseNum(s){const cleaned=String(s).replace(/,/g,"").trim();if(cleaned===""||cleaned==="-")return 0;const num=Number(cleaned);return isNaN(num)?0:num;}
function FormattedNumInput({value,onChange,style,step,placeholder}){
  const[focused,setFocused]=useState(false);
  const[editStr,setEditStr]=useState("");
  const displayValue=focused?editStr:formatNum(value);
  return(<input type="text" inputMode="decimal" value={displayValue} placeholder={placeholder}
    onChange={e=>{setEditStr(e.target.value);onChange(parseNum(e.target.value));}}
    onFocus={()=>{setFocused(true);setEditStr(value!=null&&value!==""?String(value):"");}}
    onBlur={()=>setFocused(false)}
    style={style}/>);
}
function Inp({label,value,onChange,prefix,suffix,step=1,min=0,help,placeholder}){
  const[focused,setFocused]=useState(false);
  const[editStr,setEditStr]=useState("");
  const isNum=!placeholder;
  const displayValue=isNum?(focused?editStr:formatNum(value)):value;
  const handleFocus=()=>{if(isNum){setFocused(true);setEditStr(value!=null&&value!==""?String(value):"");}};
  const handleBlur=(e)=>{e.target.style.borderColor="#cbd5e1";if(isNum){setFocused(false);const parsed=parseNum(editStr);onChange(parsed);}};
  const handleChange=(e)=>{const v=e.target.value;if(isNum){setEditStr(v);onChange(parseNum(v));}else onChange(v);};
  return(
  <div style={{marginBottom:6}}>
    <div style={{display:"flex",alignItems:"center",marginBottom:2}}>
      <label style={{fontSize:10,fontWeight:600,color:"#64748b",letterSpacing:"0.02em"}}>{label}</label>{help&&<Tip text={help}/>}
    </div>
    <div style={{display:"flex",alignItems:"center",gap:3}}>
      {prefix&&<span style={{fontSize:12,color:"#475569",fontWeight:600}}>{prefix}</span>}
      <input type="text" inputMode={isNum?"decimal":"text"} value={displayValue} onChange={handleChange} onFocus={(e)=>{e.target.style.borderColor="#3b82f6";handleFocus();}} onBlur={handleBlur} placeholder={placeholder}
        style={{width:"100%",padding:"5px 8px",border:"1px solid #cbd5e1",borderRadius:5,fontSize:12,fontFamily:placeholder?"'DM Sans',sans-serif":"'JetBrains Mono',monospace",color:"#1e293b",background:"#f8fafc",outline:"none"}}/>
      {suffix&&<span style={{fontSize:10,color:"#64748b",whiteSpace:"nowrap"}}>{suffix}</span>}
    </div>
  </div>);
}
function Sld({label,value,onChange,min,max,step=1,format="num",help}){const d=format==="pct"?pct(value):value;return(
  <div style={{marginBottom:7}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
      <div style={{display:"flex",alignItems:"center"}}><label style={{fontSize:10,fontWeight:600,color:"#64748b"}}>{label}</label>{help&&<Tip text={help}/>}</div>
      <span style={{fontSize:12,fontWeight:700,color:"#1e293b",fontFamily:"'JetBrains Mono',monospace"}}>{d}</span>
    </div>
    <input type="range" min={min} max={max} step={step} value={value} onChange={e=>onChange(Number(e.target.value))} style={{width:"100%",accentColor:"#3b82f6",height:3}}/>
  </div>);
}
function Stat({label,value,sub,color="#1e293b",bg="#f1f5f9"}){return(
  <div style={{background:bg,borderRadius:8,padding:"10px 12px",flex:1,minWidth:115}}>
    <div style={{fontSize:9,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.04em",marginBottom:3}}>{label}</div>
    <div style={{fontSize:20,fontWeight:800,color,fontFamily:"'JetBrains Mono',monospace",lineHeight:1.1}}>{value}</div>
    {sub&&<div style={{fontSize:9,color:"#94a3b8",marginTop:2}}>{sub}</div>}
  </div>);
}

    case "deprecate_software": return(<>{Array.from({length:H},(_,idx)=>idx+1).map(yr=>(

function App(){
  const urlConfig = useMemo(() => getURLConfig(), []);
  const initialDrivers = (urlConfig?.d || []).map(dr => ({ ...dr, category: dr.category || getCategoryFromLibrary(dr.id) }));
  const[drivers,setDrivers]=useState(initialDrivers);
  const[displayOrder,setDisplayOrder]=useState(() => (urlConfig?.o && urlConfig.o.length) ? urlConfig.o : buildDisplayOrderFromDrivers(urlConfig?.d || []));
  const[g,setG]=useState(urlConfig?.g ? {...DEFAULT_GLOBALS, ...urlConfig.g} : DEFAULT_GLOBALS);
  const[scenarios,setScenarios]=useState(DEFAULT_SCENARIOS);
  const[tab,setTab]=useState("drivers");
  const[showLibrary,setShowLibrary]=useState(false);
  const[editingDriver,setEditingDriver]=useState(null);
  const[editingScenario,setEditingScenario]=useState(null);
  const[addingScenario,setAddingScenario]=useState(false);
  const[kpis,setKpis]=useState(urlConfig?.k || []);
  const[removedKpis,setRemovedKpis]=useState(urlConfig?.r || {});
  const[panelOpen,setPanelOpen]=useState(!urlConfig);
  const[leftPanelWidth,setLeftPanelWidth]=useState(360);
  const[resizing,setResizing]=useState(false);
  useEffect(()=>{
    if(!resizing)return;
    const onMove=e=>{const x=e.clientX!=null?e.clientX:e.touches?e.touches[0].clientX:0;setLeftPanelWidth(Math.min(600,Math.max(260,x)));};
    const onEnd=()=>setResizing(false);
    window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onEnd);window.addEventListener("touchmove",onMove,{passive:true});window.addEventListener("touchend",onEnd);
    return()=>{window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onEnd);window.removeEventListener("touchmove",onMove);window.removeEventListener("touchend",onEnd);};
  },[resizing]);
  const[openSections,setOpenSections]=useState(()=>{
    const m={}; if(urlConfig?.d) urlConfig.d.forEach((d,i)=>m[d.id]=i===0); return m;
  });
  const[shareModal,setShareModal]=useState(false);
  const[toast,setToast]=useState("");
  React.useEffect(()=>{if(toast){const t=setTimeout(()=>setToast(""),3000);return()=>clearTimeout(t);}},[toast]);
  const[showModels,setShowModels]=useState(false);
  const[savedModels,setSavedModels]=useState(()=>{try{return JSON.parse(localStorage.getItem("wrike_models")||"[]");}catch(e){return[];}});
  const[shareURL,setShareURL]=useState("");
  const[showHours,setShowHours]=useState(false);
  _cur=g.currency||"$";
  const editMode=true;
  const ug=(k)=>(v)=>setG(p=>({...p,[k]:v}));
  const ts=(id)=>setOpenSections(p=>({...p,[id]:!p[id]}));
  const setPhaseDown=(yr,val)=>setG(p=>{const a=[...p.legacyPhaseDown];a[yr]=val;return{...p,legacyPhaseDown:a};});
  const setWrikeCost=(yr,val)=>setG(p=>{const a=[...p.wrikeCostByYear];a[yr]=val;return{...p,wrikeCostByYear:a};});

  const saveModel=()=>{

                {g.legacySavingsEnabled&&(<tr><td style={{padding:"4px 10px",color:"#334155",borderBottom:"1px solid #f1f5f9",fontSize:10}}>Legacy Tool(s) Savings</td>{model.years.map(y=>(<td key={y.year} style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,borderBottom:"1px solid #f1f5f9"}}>{fmt(y.legacySav)}</td>))}<td style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,borderBottom:"1px solid #f1f5f9",borderLeft:"2px solid #e2e8f0"}}>{fmt(model.lt._l4)}</td></tr>)}
                {g.fteAvoidanceEnabled&&(<tr><td style={{padding:"4px 10px",color:"#334155",borderBottom:"1px solid #f1f5f9",fontSize:10}}>FTE Avoidance</td>{model.years.map(y=>(<td key={y.year} style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,borderBottom:"1px solid #f1f5f9"}}>{fmt(y.fteSav)}</td>))}<td style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,borderBottom:"1px solid #f1f5f9",borderLeft:"2px solid #e2e8f0"}}>{fmt(model.lt._fte)}</td></tr>)}
                <tr style={{background:"#f0fdf4"}}><td style={{padding:"4px 10px",fontWeight:700,color:"#059669",borderBottom:"1px solid #f1f5f9",fontSize:10}}>Total Benefit</td>{model.years.map(y=>(<td key={y.year} style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,borderBottom:"1px solid #f1f5f9",color:"#059669"}}>{fmt(y.totalBenefit)}</td>))}<td style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,borderBottom:"1px solid #f1f5f9",borderLeft:"2px solid #e2e8f0",color:"#059669"}}>{fmt(model.years.reduce((a,y)=>a+y.totalBenefit,0))}</td></tr>
                <tr><td colSpan={model.years.length+2} style={{padding:"8px 10px 3px",fontWeight:800,fontSize:9,color:"#1e3a5f",textTransform:"uppercase",borderBottom:"1px solid #e2e8f0"}}>NET</td></tr>
                {[{l:"Net Benefit",k:"net"},...(g.discountEnabled?[{l:"PV Net Benefit",k:"pvNet"}]:[])].map((row,i)=>{const total=model.years.reduce((a,y)=>a+y[row.k],0);return(<tr key={`n${i}`}><td style={{padding:"4px 10px",fontWeight:700,borderBottom:"1px solid #f1f5f9",fontSize:10}}>{row.l}</td>{model.years.map(y=>(<td key={y.year} style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,borderBottom:"1px solid #f1f5f9",color:y[row.k]>=0?"#059669":"#dc2626"}}>{fmt(y[row.k])}</td>))}<td style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,borderBottom:"1px solid #f1f5f9",borderLeft:"2px solid #e2e8f0",color:total>=0?"#059669":"#dc2626"}}>{fmt(total)}</td></tr>);})}
                <tr style={{background:"#f0f9ff"}}><td style={{padding:"4px 10px",fontWeight:700,color:"#0369a1",borderBottom:"1px solid #f1f5f9",fontSize:10}}>Cumulative ROI</td>{model.years.map((y,i)=>{const cumCost=model.years.slice(0,i+1).reduce((a,yr)=>a+yr.totalCost,0);const cumBen=model.years.slice(0,i+1).reduce((a,yr)=>a+yr.totalBenefit,0);const cumRoi=cumCost>0?(cumBen-cumCost)/cumCost:0;return(<td key={y.year} style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,borderBottom:"1px solid #f1f5f9",color:cumRoi>=0?"#0369a1":"#dc2626"}}>{pct(cumRoi)}</td>);})}<td style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,borderBottom:"1px solid #f1f5f9",borderLeft:"2px solid #e2e8f0",color:model.roi>=0?"#0369a1":"#dc2626"}}>{pct(model.roi)}</td></tr>
                <tr style={{background:"#f5f3ff"}}><td style={{padding:"4px 10px",fontWeight:700,color:"#7c3aed",borderBottom:"1px solid #f1f5f9",fontSize:10}}>Payback Period</td>{model.years.map((y,i)=>{const reached=model.pbm&&model.pbm<=(y.year*12);const thisYr=model.pbm&&model.pbm>(( y.year-1)*12)&&model.pbm<=(y.year*12);return(<td key={y.year} style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:thisYr?700:400,borderBottom:"1px solid #f1f5f9",color:thisYr?"#7c3aed":reached?"#a78bfa":"#94a3b8"}}>{thisYr?`Mo ${model.pbm} ✓`:reached?"achieved":"—"}</td>);})}<td style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,borderBottom:"1px solid #f1f5f9",borderLeft:"2px solid #e2e8f0",color:"#7c3aed"}}>{model.pbm?`${model.pbm} months`:"N/A"}</td></tr>
              </tbody>
            </table></div>)}

          
          {/* KPIs - auto-mapped from drivers */}
          <div style={{marginTop:16,background:"#f0f9ff",borderRadius:7,padding:12,border:"1px solid #bae6fd"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <div style={{fontSize:10,fontWeight:700,color:"#0369a1",textTransform:"uppercase"}}>Post-Implementation KPIs</div>
              {editMode&&<button onClick={()=>setKpis(p=>[...p,""])} style={{fontSize:9,color:"#3b82f6",background:"none",border:"none",cursor:"pointer",fontWeight:600}}>+ Add KPI</button>}
            </div>
            {editMode?(
              <div style={{display:"grid",gap:3}}>
                {mappedKpis.map((k,i)=>{const isFromDriver=drivers.some(d=>d.enabled&&d.kpis&&d.kpis.includes(k));const isCustom=kpis.includes(k);return(
                  <div key={i} style={{display:"flex",gap:4,alignItems:"center"}}>
                    {isFromDriver&&!isCustom?(<>
                      <span style={{fontSize:10,color:"#334155",flex:1,padding:"3px 6px",background:"#ecfdf5",borderRadius:4,border:"1px solid #bbf7d0"}}>{"•"} {k} <span style={{fontSize:8,color:"#94a3b8"}}>(auto)</span></span>
                      <button onClick={()=>setRemovedKpis(p=>({...p,[k]:true}))} style={{border:"none",background:"none",cursor:"pointer",fontSize:12,color:"#dc2626"}}>{"×"}</button>
                    </>):(<>
                      <input value={k} onChange={e=>{const a=[...kpis];const ci=kpis.indexOf(k);if(ci>=0){a[ci]=e.target.value;setKpis(a);}}} style={{flex:1,padding:"3px 6px",border:"1px solid #bae6fd",borderRadius:4,fontSize:10,outline:"none",background:"white"}}/>
                      <button onClick={()=>setKpis(kpis.filter(x=>x!==k))} style={{border:"none",background:"none",cursor:"pointer",fontSize:12,color:"#dc2626"}}>{"×"}</button>
                    </>)}
                  </div>);})}
              </div>
            ):(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,fontSize:10,color:"#334155"}}>
                {mappedKpis.filter(k=>k).map((k,i)=><div key={i}>{"•"} {k}</div>)}
              </div>
            )}
          </div>
        </div>
      </div>
      {/* TOAST */}
      {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#1e293b",color:"white",padding:"10px 24px",borderRadius:8,fontSize:12,fontWeight:600,boxShadow:"0 8px 24px rgba(0,0,0,0.3)",zIndex:2000,animation:"fadeIn 0.2s"}}>{toast}</div>}
      {/* MY MODELS MODAL */}
      {showModels&&<Modal onClose={()=>setShowModels(false)} wide>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:16,fontWeight:700}}>My Prospect Models</div>
          <div style={{display:"flex",gap:6}}>
            <label style={{padding:"6px 12px",borderRadius:6,border:"1px solid #cbd5e1",background:"white",cursor:"pointer",fontSize:11,fontWeight:600,color:"#475569"}}>
              Import JSON <input type="file" accept=".json" onChange={importJSON} style={{display:"none"}}/>
            </label>
            <button onClick={exportJSON} style={{padding:"6px 12px",borderRadius:6,border:"1px solid #cbd5e1",background:"white",cursor:"pointer",fontSize:11,fontWeight:600,color:"#475569"}}>Export Current</button>
            <button onClick={()=>{const all=JSON.stringify(savedModels,null,2);const blob=new Blob([all],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="Wrike_All_Models_Backup.json";a.click();}} style={{padding:"6px 12px",borderRadius:6,border:"1px solid #059669",background:"#ecfdf5",cursor:"pointer",fontSize:11,fontWeight:600,color:"#059669"}}>Backup All</button>
          </div>
        </div>
        {savedModels.length===0?(<div style={{textAlign:"center",padding:"24px",color:"#94a3b8",fontSize:12}}>No saved models yet. Enter customer data and click Save.</div>):(
          <div style={{display:"grid",gap:6}}>
            {savedModels.map((m,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",border:"1px solid #e2e8f0",borderRadius:8,background:"white"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>{m.name}</div>
                <div style={{fontSize:10,color:"#94a3b8"}}>{m.date} • {(m.d||[]).length} drivers • {m.g?.horizon||3}yr</div>
              </div>
              <button onClick={()=>loadModel(m)} style={{padding:"6px 12px",borderRadius:6,border:"none",background:"#3b82f6",color:"white",cursor:"pointer",fontSize:11,fontWeight:600}}>Load</button>
              <button onClick={()=>{const url=generateShareURL(m.d||[],{...DEFAULT_GLOBALS,...(m.g||{})},m.k||[],m.r||{},m.o||[]);if(url){navigator.clipboard.writeText(url).catch(()=>{});setToast("Link copied — send to prospect!");setShowModels(false);}else{setToast("Could not generate link.");}}} style={{padding:"6px 12px",borderRadius:6,border:"1px solid rgba(59,130,246,0.4)",background:"rgba(59,130,246,0.1)",color:"#3b82f6",cursor:"pointer",fontSize:11,fontWeight:600}}>Share</button>
              <button onClick={()=>{const data={...m};const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`Wrike_Model_${m.name}.json`;a.click();}} style={{padding:"6px 12px",borderRadius:6,border:"1px solid #cbd5e1",background:"white",cursor:"pointer",fontSize:11,fontWeight:600,color:"#475569"}}>Export</button>
              <button onClick={()=>deleteModel(i)} style={{border:"none",background:"none",cursor:"pointer",fontSize:14,color:"#dc2626"}}>×</button>
            </div>))}
          </div>
        )}
        <div style={{marginTop:14,padding:"10px",background:"#f8fafc",borderRadius:6,border:"1px solid #e2e8f0",fontSize:10,color:"#64748b",lineHeight:1.6}}>
          <strong>Share</strong> — Generates a compressed URL (using LZ-string) you can send directly to a prospect. They open it and see your model with all inputs pre-loaded. <strong>Export JSON</strong> — Downloads the model as a file for backing up to Google Drive or handing off to another rep. <strong>Import JSON</strong> — Loads a previously exported file into this browser. <strong>Backup All</strong> — Downloads every saved model at once.</div>
      </Modal>}
      {/* SHARE MODAL */}
      {shareModal&&<Modal onClose={()=>setShareModal(false)}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>Share This Model</div>
        <div style={{fontSize:11,color:"#64748b",marginBottom:12,lineHeight:1.5}}>Anyone who opens this link will see the model with all your current inputs, value drivers, and assumptions pre-loaded. They can adjust values but their changes won't affect your link.</div>
        <div style={{position:"relative",marginBottom:12}}>
          <textarea readOnly value={shareURL} style={{width:"100%",padding:"10px",border:"1px solid #cbd5e1",borderRadius:6,fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:"#334155",background:"#f8fafc",outline:"none",resize:"none",height:70,boxSizing:"border-box"}} onClick={e=>e.target.select()}/>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button onClick={()=>setShareModal(false)} style={{padding:"8px 14px",border:"1px solid #cbd5e1",borderRadius:6,background:"white",cursor:"pointer",fontSize:12,fontWeight:600,color:"#475569"}}>Close</button>
          <button onClick={()=>{navigator.clipboard.writeText(shareURL).then(()=>{const btn=document.getElementById("_cpbtn");if(btn){btn.textContent="Copied!";setTimeout(()=>btn.textContent="\uD83D\uDCCB Copy Link",2000);}});}} id="_cpbtn" style={{padding:"8px 14px",border:"none",borderRadius:6,background:"#3b82f6",color:"white",cursor:"pointer",fontSize:12,fontWeight:600}}>{"\uD83D\uDCCB"} Copy Link</button>
        </div>
      </Modal>}
      {editingDriver&&<EditDriverModal driver={editingDriver} onClose={()=>setEditingDriver(null)}
        onSave={upd=>{setDrivers(p=>p.map(d=>d.id===upd.id?upd:d));setEditingDriver(null);}}
        onDelete={()=>{setDrivers(p=>p.filter(d=>d.id!==editingDriver.id));setDisplayOrder(p=>p.filter(x=>!(x.type==="driver"&&x.id===editingDriver.id)));setEditingDriver(null);}}/>}
      {showLibrary&&<DriverLibraryModal existingIds={drivers.map(d=>d.id)} onClose={()=>setShowLibrary(false)}
        onAdd={nd=>{setDrivers(p=>[...p,...nd]);setDisplayOrder(p=>insertDriversIntoDisplayOrder(p,nd));const ns={};nd.forEach(d=>ns[d.id]=true);setOpenSections(prev=>({...prev,...ns}));setShowLibrary(false);}}/>}
      {editingScenario&&<EditScenarioModal scenario={editingScenario} drivers={drivers} globals={g} onClose={()=>setEditingScenario(null)}
        onSave={upd=>{setScenarios(p=>p.map(s=>s.id===upd.id?upd:s));setEditingScenario(null);}}
        onDelete={()=>{setScenarios(p=>p.filter(s=>s.id!==editingScenario.id));setEditingScenario(null);}}/>}
      {addingScenario&&<EditScenarioModal scenario={{id:`sc_${Date.now()}`,name:"",desc:"",enabled:true,overrides:{leverOverrides:{},globalOverrides:{},leverInputOverrides:{}}}} drivers={drivers} globals={g} onClose={()=>setAddingScenario(false)}
        onSave={newS=>{setScenarios(p=>[...p,newS]);setAddingScenario(false);}}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
